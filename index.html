<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Purge Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d0f14;
  --surface: #13161e;
  --sur2:    #1b1f2b;
  --border:  #252a38;
  --accent:  #e8c547;
  --green:   #47c98a;
  --text:    #e8eaf0;
  --muted:   #6b7280;
  --blue:    #2d9cdb;
  --orange:  #e06b47;
  --red:     #c94e4e;
  --purple:  #9b59b6;
}
html { font-size: 13px; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 200; gap: 10px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--accent); white-space: nowrap; }
.logo span { color: var(--text); opacity: .4; margin: 0 5px; }
.store-wrap { display: flex; align-items: center; gap: 7px; }
.store-label { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.store-select { background: var(--sur2); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 5px 10px; font-family: 'DM Sans', sans-serif; font-size: .82rem; outline: none; cursor: pointer; min-width: 200px; transition: border-color .15s; }
.store-select:focus { border-color: var(--accent); }
.store-select option { background: var(--sur2); }
.top-right { display: flex; align-items: center; gap: 7px; }
.chip { font-family: 'DM Mono', monospace; font-size: .68rem; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--sur2); color: var(--muted); white-space: nowrap; }
.chip strong { color: var(--text); }
.btn-sm { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: 5px 10px; font-size: .76rem; cursor: pointer; transition: all .15s; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-export { display: flex; align-items: center; gap: 5px; background: var(--sur2); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 5px 11px; font-size: .76rem; cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif; }
.btn-export:hover { border-color: var(--green); color: var(--green); }

.sub-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; }
.sub-tab { padding: 10px 16px; font-size: .82rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
.sub-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

.view-bar { background: var(--sur2); border-bottom: 1px solid var(--border); padding: 7px 20px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.view-pill { font-size: .78rem; font-weight: 500; padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
.view-pill:hover { color: var(--text); border-color: var(--muted); }
.view-pill.active                       { background: var(--blue);   color: #fff; border-color: var(--blue); }
.view-pill[data-v="All Purge"].active   { background: #1a5276; color: #fff; border-color: #1a5276; }
.view-pill[data-v="Realignment"].active { background: #1a6b9a; color: #fff; border-color: #1a6b9a; }
.view-pill[data-v="One Off"].active     { background: var(--orange); color: #fff; border-color: var(--orange); }
.view-pill[data-v="Purge List"].active  { background: var(--red);    color: #fff; border-color: var(--red); }
.view-pill[data-v="Purge Group"].active { background: var(--purple); color: #fff; border-color: var(--purple); }
.type-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.type-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }

.type-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 20px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; min-height: 36px; }
.type-pill { font-size: .73rem; padding: 3px 11px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
.type-pill:hover { color: var(--text); border-color: var(--muted); }
.type-pill.active { background: var(--sur2); color: var(--text); border-color: var(--accent); }

.summary-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; }
.v-yellow { color: var(--accent); }
.v-white  { color: var(--text); }
.v-red    { color: var(--red); }
.stat-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-top: 2px; }
.stat-sub { font-size: .78rem; font-weight: 600; color: var(--orange); }
.stat-sub.blue { color: var(--blue); }
.stat-div { width: 1px; height: 34px; background: var(--border); }
.search-right { margin-left: auto; position: relative; }
.search-right svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-input { background: var(--sur2); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 6px 12px 6px 30px; font-size: .82rem; font-family: 'DM Sans', sans-serif; outline: none; width: 210px; transition: border-color .15s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.table-outer { overflow: auto; max-height: calc(100vh - 255px); }
table { width: 100%; border-collapse: collapse; font-size: .78rem; }
thead { position: sticky; top: 0; z-index: 10; }
thead tr.group-row th { background: var(--sur2); font-family: 'DM Mono', monospace; font-size: .62rem; text-transform: uppercase; letter-spacing: .8px; text-align: center; padding: 4px 6px; border-bottom: 1px solid var(--border); font-weight: 500; color: var(--muted); }
thead tr.group-row th.g-store { color: var(--blue);   border-top: 2px solid var(--blue); }
thead tr.group-row th.g-wh    { color: var(--purple); border-top: 2px solid var(--purple); }
thead tr.group-row th.g-sales { color: var(--green);  border-top: 2px solid var(--green); }
thead tr.group-row th.g-purge { color: var(--accent); border-top: 2px solid var(--accent); }
thead tr.col-row th { background: var(--sur2); color: var(--muted); font-weight: 600; font-size: .71rem; padding: 7px 10px; text-align: left; white-space: nowrap; border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; }
thead tr.col-row th:hover { color: var(--text); }
thead tr.col-row th.sorted { color: var(--accent); }
thead tr.col-row th.r { text-align: right; }
thead tr.col-row th.c { text-align: center; }
.sort-icon { margin-left: 3px; opacity: .4; font-size: .65rem; }
.sorted .sort-icon { opacity: 1; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:nth-child(even) { background: #13161e; }
tbody tr:nth-child(odd)  { background: #181c27; }
tbody tr:hover { background: #1e2234; }
td { padding: 7px 10px; vertical-align: middle; white-space: nowrap; }
td.r { text-align: right; font-family: 'DM Mono', monospace; font-size: .74rem; }
td.c { text-align: center; }

.yn  { display: inline-block; font-size: .67rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; border: 1px solid; text-transform: uppercase; }
.yn-yes { color: var(--green);  border-color: #47c98a55; background: #47c98a18; }
.yn-no  { color: var(--red);    border-color: #c94e4e55; background: #c94e4e15; }
.badge  { display: inline-block; font-size: .67rem; font-weight: 700; padding: 2px 9px; border-radius: 4px; border: 1px solid; text-transform: uppercase; }
.b-re  { color: var(--blue);   border-color: #2d9cdb55; background: #2d9cdb18; }
.b-one { color: var(--orange); border-color: #e06b4755; background: #e06b4718; }
.b-sta { color: var(--green);  border-color: #47c98a55; background: #47c98a18; }
.b-oth { color: var(--muted);  border-color: var(--border); background: var(--sur2); }
.sizes-avail { color: var(--blue); font-size: .72rem; }
.purge-hi    { color: var(--accent); font-weight: 700; font-family: 'DM Mono', monospace; }

/* LOADING SCREEN */
.load-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity .5s; }
.load-screen.done { opacity: 0; pointer-events: none; }
.load-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 8px; }
.load-logo span { color: var(--text); opacity: .4; margin: 0 8px; }
.load-sub { font-size: .78rem; color: var(--muted); margin-bottom: 30px; letter-spacing: 1px; }
.progress-wrap { width: 340px; background: var(--sur2); border-radius: 20px; height: 5px; overflow: hidden; margin-bottom: 14px; }
.progress-bar  { height: 100%; background: var(--accent); border-radius: 20px; width: 0%; transition: width .4s ease; }
.load-msg   { font-size: .8rem; color: var(--muted); text-align: center; }

.center-msg { text-align: center; padding: 70px 20px; color: var(--muted); }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="load-screen" id="load-screen">
  <div class="load-logo">Purge <span>/</span> Dashboard</div>
  <div class="load-sub">State and Liberty</div>
  <div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>
  <div class="load-msg" id="load-msg">Connecting to Google Sheet…</div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">Purge <span>/</span> Dashboard</div>
  <div class="store-wrap">
    <span class="store-label">Store</span>
    <select class="store-select" id="store-select" onchange="switchStore(this.value)">
      <option value="">— loading —</option>
    </select>
  </div>
  <div class="top-right">
    <div class="chip">As of: <strong id="meta-date">—</strong></div>
    <button class="btn-sm" onclick="reloadAll()">↺ Refresh</button>
    <button class="btn-export" onclick="exportCSV()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      CSV
    </button>
  </div>
</div>

<!-- SUB NAV -->
<div class="sub-nav">
  <div class="sub-tab active">📋 Store Dashboard</div>
  <div class="sub-tab">🚀 New Launch / Restock</div>
</div>

<!-- VIEW TABS -->
<div class="view-bar">
  <button class="view-pill" data-v="Purge Group"  onclick="setView('Purge Group',this)">Purge Group</button>
  <button class="view-pill" data-v="All Purge"    onclick="setView('All Purge',this)">All Purge</button>
  <button class="view-pill" data-v="Realignment"  onclick="setView('Realignment',this)">Realignment</button>
  <button class="view-pill" data-v="One Off"      onclick="setView('One Off',this)">One Off</button>
  <button class="view-pill active" data-v="Purge List" onclick="setView('Purge List',this)">Purge List</button>
  <div class="type-sep"></div>
  <span class="type-label">Type</span>
</div>

<!-- TYPE BAR -->
<div class="type-bar" id="type-bar">
  <button class="type-pill active" data-t="All" onclick="setType('All',this)">All</button>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="stat"><span class="stat-val v-yellow" id="s-items">0</span><span class="stat-label">Items</span></div>
  <div class="stat-div"></div>
  <div class="stat"><span class="stat-val v-white"  id="s-onhand">0</span><span class="stat-label">Total on Hand</span></div>
  <div class="stat-div"></div>
  <div class="stat"><span class="stat-val v-red"    id="s-purge">0</span><span class="stat-label">Total Purge Qty</span></div>
  <div class="stat-div"></div>
  <div class="stat"><span class="stat-sub"          id="s-oneoff">0 (0 units)</span><span class="stat-label">One Off</span></div>
  <div class="stat-div"></div>
  <div class="stat"><span class="stat-sub blue"     id="s-realign">0 (0 units)</span><span class="stat-label">Realignment</span></div>
  <div class="search-right">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" type="text" id="search" placeholder="Search products…" oninput="renderTable()" />
  </div>
</div>

<!-- TABLE -->
<div class="table-outer" id="table-outer">
  <div class="center-msg">Loading…</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbydpAT9V1Nha_epSTBxOTPale-6cYwse6vRr0CG4NHCxbSYUombX4TDXg3UKt2VxEhayg/exec';

let allData     = {};
let headers     = [];
let activeStore = '';
let activeView  = 'Purge List';
let activeType  = 'All';
let sortCol     = -1;
let sortAsc     = true;

const EXCLUDED = ['accessory','belt','scarf','pocket square','ties'];

const COL_GROUPS = [
  { label: '',           cls: '',        cols: ['Product Type','Parent Name','Size'] },
  { label: 'Store Data', cls: 'g-store', cols: ['Store Onhand','Store Intransit','Sizes OH','Available Sizes'] },
  { label: 'WH Data',    cls: 'g-wh',    cols: ['WHSE INV','ON Order','ETA','# of Days to Arrive'] },
  { label: 'Sales Data', cls: 'g-sales', cols: ['Avg Weekly Sales','Avg Monthly Sales','L30','L60','L90'] },
  { label: 'Purge Data', cls: 'g-purge', cols: ['Purge Quantity','Reason','Final Reason'] },
];

window.addEventListener('DOMContentLoaded', loadAll);

async function loadAll() {
  setProgress(5, 'Connecting to Google Sheet…');
  try {
    setProgress(15, 'Reading all tabs (INV, L30, L60, L90, Staple…)');
    const res = await fetch(API_URL + '?action=getAllData&t=' + Date.now());
    setProgress(60, 'Processing data…');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    headers     = data.headers || [];
    allData     = data.data    || {};
    const stores = data.stores || Object.keys(allData);

    setProgress(80, 'Building store selector…');

    const sel = document.getElementById('store-select');
    sel.innerHTML = '';
    stores.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s; sel.appendChild(o);
    });

    activeStore = data.meta?.defaultStore || stores[0] || '';
    sel.value   = activeStore;
    if (data.meta?.asOf) document.getElementById('meta-date').textContent = data.meta.asOf;

    setProgress(95, 'Rendering…');
    buildTypeBar();
    renderTable();
    setProgress(100, 'Ready!');
    setTimeout(() => document.getElementById('load-screen').classList.add('done'), 500);

  } catch(e) {
    setProgress(100, '⚠️ Error: ' + e.message);
  }
}

async function reloadAll() {
  document.getElementById('load-screen').classList.remove('done');
  await loadAll();
}

function setProgress(pct, msg) {
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('load-msg').textContent = msg;
}

// ── INSTANT switching — no network calls ─────────────────
function switchStore(store) {
  activeStore = store;
  activeType  = 'All';
  document.querySelectorAll('.type-pill').forEach(p => p.classList.toggle('active', p.dataset.t === 'All'));
  buildTypeBar();
  renderTable();
}

function setView(view, el) {
  activeView = view;
  document.querySelectorAll('.view-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeType = 'All';
  document.querySelectorAll('.type-pill').forEach(p => p.classList.toggle('active', p.dataset.t === 'All'));
  renderTable();
}

function setType(t, el) {
  activeType = t;
  document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function buildTypeBar() {
  const rows  = allData[activeStore] || [];
  const types = [...new Set(rows.map(r => String(r['Product Type']||'')).filter(Boolean))].sort();
  const bar   = document.getElementById('type-bar');
  bar.innerHTML = '<button class="type-pill active" data-t="All" onclick="setType(\'All\',this)">All</button>';
  types.forEach(t => {
    const b = document.createElement('button');
    b.className = 'type-pill'; b.dataset.t = t; b.textContent = t;
    b.onclick = function() { setType(t, this); };
    bar.appendChild(b);
  });
}

function getFilteredRows() {
  const rows = allData[activeStore] || [];
  const q    = (document.getElementById('search')?.value || '').toLowerCase();

  return rows.filter(row => {
    const type     = String(row['Product Type']||'').toLowerCase().trim();
    const name     = String(row['Parent Name'] ||'').toLowerCase();
    const reason   = String(row['Reason']      ||'').trim();
    const purgeQty = parseFloat(row['Purge Quantity']) || 0;
    const purgeAB  = parseFloat(row['Purge Quantity']) || 0;

    if (EXCLUDED.includes(type)) return false;
    if (activeType !== 'All' && String(row['Product Type']||'') !== activeType) return false;
    if (q && !name.includes(q)) return false;

    switch (activeView) {
      case 'All Purge':   return purgeQty > 0 && reason !== 'New';
      case 'Realignment': return purgeQty > 0 && reason === 'Realignment';
      case 'One Off':     return purgeQty > 0 && reason === 'One Off';
      case 'Purge List':  return purgeAB  > 0 && reason !== 'Staple' && reason !== '' && reason !== 'New';
      case 'Purge Group': return purgeQty > 0;
      default:            return true;
    }
  });
}

function renderTable() {
  let rows = getFilteredRows();

  if (sortCol >= 0 && sortCol < headers.length) {
    const key = headers[sortCol];
    rows = [...rows].sort((a, b) => {
      let av = a[key], bv = b[key];
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) { av = an; bv = bn; }
      else { av = String(av||'').toLowerCase(); bv = String(bv||'').toLowerCase(); }
      return sortAsc ? (av > bv ? 1 : av < bv ? -1 : 0) : (av < bv ? 1 : av > bv ? -1 : 0);
    });
  }

  updateSummary(rows);

  const dispCols = COL_GROUPS.flatMap(g => g.cols.filter(c => headers.includes(c)));
  const cols     = dispCols.length ? dispCols : headers;

  let gHtml = '<tr class="group-row">';
  COL_GROUPS.forEach(g => {
    const ex = g.cols.filter(c => headers.includes(c));
    if (!ex.length) return;
    gHtml += `<th colspan="${ex.length}" class="${g.cls}">${g.label}</th>`;
  });
  gHtml += '</tr>';

  let cHtml = '<tr class="col-row">';
  cols.forEach(col => {
    const idx    = headers.indexOf(col);
    const sorted = sortCol === idx;
    const arrow  = sorted ? (sortAsc ? '↑' : '↓') : '↕';
    const align  = isNum(col) ? ' r' : isCtr(col) ? ' c' : '';
    cHtml += `<th class="${sorted?'sorted':''}${align}" onclick="sortBy(${idx})">${col} <span class="sort-icon">${arrow}</span></th>`;
  });
  cHtml += '</tr>';

  const body = !rows.length
    ? `<tr><td colspan="${cols.length}" style="text-align:center;padding:40px;color:var(--muted)">No items match this filter.</td></tr>`
    : rows.map(r => '<tr>' + cols.map(c => cell(c, r[c])).join('') + '</tr>').join('');

  document.getElementById('table-outer').innerHTML =
    `<table><thead>${gHtml}${cHtml}</thead><tbody>${body}</tbody></table>`;
}

function cell(col, val) {
  const s = String(val === null || val === undefined ? '' : val).trim();
  if (s === 'Yes') return `<td class="c"><span class="yn yn-yes">Yes</span></td>`;
  if (s === 'No')  return `<td class="c"><span class="yn yn-no">No</span></td>`;
  if (col === 'Reason' || col === 'Final Reason') {
    if (s === 'Realignment') return `<td><span class="badge b-re">Realignment</span></td>`;
    if (s === 'One Off')     return `<td><span class="badge b-one">One Off</span></td>`;
    if (s === 'Staple')      return `<td><span class="badge b-sta">Staple</span></td>`;
    if (s) return `<td><span class="badge b-oth">${s}</span></td>`;
    return `<td style="color:var(--muted)">—</td>`;
  }
  if (col === 'Sizes OH' || col === 'Available Sizes') {
    if (!s) return `<td style="color:var(--muted)">—</td>`;
    if (s.toLowerCase().includes('all sizes')) return `<td class="sizes-avail">${s}</td>`;
    return `<td>${s}</td>`;
  }
  if (col === 'Purge Quantity') {
    const n = parseFloat(s);
    if (!isNaN(n) && n > 0) return `<td class="r purge-hi">${n}</td>`;
    return `<td class="r" style="color:var(--muted)">—</td>`;
  }
  if (isNum(col)) {
    const n = parseFloat(s);
    if (isNaN(n) || s === '') return `<td class="r" style="color:var(--muted)">—</td>`;
    return `<td class="r">${Number.isInteger(n) ? n.toLocaleString() : n.toFixed(1)}</td>`;
  }
  if (col === 'Size') return `<td class="c">${s || '—'}</td>`;
  return `<td>${s || '<span style="color:var(--muted)">—</span>'}</td>`;
}

function updateSummary(rows) {
  const sum = (arr, key) => arr.reduce((s,r) => { const n=parseFloat(r[key]); return s+(isNaN(n)?0:n); }, 0);
  const oneRows = rows.filter(r => r['Reason'] === 'One Off');
  const reRows  = rows.filter(r => r['Reason'] === 'Realignment');
  document.getElementById('s-items').textContent  = rows.length.toLocaleString();
  document.getElementById('s-onhand').textContent = sum(rows,'Store Onhand').toLocaleString();
  document.getElementById('s-purge').textContent  = sum(rows,'Purge Quantity').toLocaleString();
  document.getElementById('s-oneoff').textContent = `${oneRows.length} (${sum(oneRows,'Purge Quantity')} units)`;
  document.getElementById('s-realign').textContent= `${reRows.length} (${sum(reRows,'Purge Quantity')} units)`;
}

function isNum(col) { return ['Store Onhand','Store Intransit','L30','L60','L90','# of Days to Arrive','Avg Weekly Sales','Avg Monthly Sales'].includes(col); }
function isCtr(col) { return ['Size','WHSE INV','ON Order'].includes(col); }
function sortBy(idx) {
  if (sortCol === idx) sortAsc = !sortAsc; else { sortCol = idx; sortAsc = true; }
  renderTable();
}

function exportCSV() {
  const rows = getFilteredRows();
  const cols = COL_GROUPS.flatMap(g => g.cols.filter(c => headers.includes(c)));
  const esc  = v => { const s=String(v??''); return (s.includes(',')||s.includes('"')) ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv  = cols.map(esc).join(',') + '\n' + rows.map(r => cols.map(c => esc(r[c])).join(',')).join('\n');
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv],{type:'text/csv'})),
    download: `purge-${activeStore.replace(/ /g,'-')}-${activeView.replace(/ /g,'-')}-${new Date().toISOString().slice(0,10)}.csv`
  }).click();
}
</script>
